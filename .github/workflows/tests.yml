name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff Format Check
        run: ruff format --check .

      - name: Start Flask app and check health
        run: |
          set -euo pipefail
          python -m flask --app app run --host 127.0.0.1 --port 5056 &
          FLASK_PID=$!
          for i in {1..20}; do
            if curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
              echo "Flask health check passed"
              kill "$FLASK_PID"
              wait "$FLASK_PID" || true
              exit 0
            fi
            sleep 0.5
          done
          echo "Flask health check failed"
          kill "$FLASK_PID" || true
          wait "$FLASK_PID" || true
          exit 1

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile -t fpca-aft-addon:ci .

  browser-ui:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Browser UI Check
        env:
          OPTIONS_FILE: ${{ github.workspace }}/options.json
          HA_RECORDER_DB_PATH: /tmp/home-assistant_v2.db
          RUN_BROWSER_TESTS: "1"
          BROWSER_BASE_URL: http://127.0.0.1:5056
        run: |
          set -euo pipefail
          python recorder_db_fixture.py /tmp/home-assistant_v2.db
          python -m flask --app app run --host 127.0.0.1 --port 5056 > /tmp/flask.log 2>&1 &
          FLASK_PID=$!
          cleanup() {
            kill "$FLASK_PID" || true
            wait "$FLASK_PID" || true
          }
          trap cleanup EXIT

          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
            echo "Flask app did not become ready for browser smoke test"
            cat /tmp/flask.log || true
            exit 1
          fi

          pytest tests/test_browser_ui.py -q

  addon-install:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Start Supervisor Devcontainer
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          docker run -d --name "$CONTAINER" --privileged \
            -e GIT_EDITOR="code --wait" \
            -e WORKSPACE_DIRECTORY="/workspaces/${{ github.event.repository.name }}" \
            -v "${{ github.workspace }}:/workspaces/${{ github.event.repository.name }}" \
            -v /var/lib/docker \
            -v /mnt/supervisor \
            --entrypoint bash \
            ghcr.io/home-assistant/devcontainer:2-addons -lc "sleep infinity"
          # Ensure helper scripts are executable and keep env vars during sudo
          docker exec "$CONTAINER" bash -lc "sudo chmod a+x /usr/bin/supervisor_* /usr/bin/ha || true"

          docker exec "$CONTAINER" bash -lc "sudo -E bash devcontainer_bootstrap"
          # supervisor_run calls `stty sane` after Docker starts. GitHub Actions
          # has no interactive TTY, so keep that reset best-effort for CI.
          docker exec "$CONTAINER" bash -lc "sudo sed -i 's/stty sane/stty sane || true/' /etc/supervisor_scripts/common"
          docker exec "$CONTAINER" bash -lc "sudo -E supervisor_run >/tmp/supervisor_run.log 2>&1 & echo \$! >/tmp/supervisor_run.pid"

          echo "Waiting for Supervisor..."
          for i in {1..60}; do
            if docker exec "$CONTAINER" bash -lc "ha --no-progress supervisor info" > /dev/null 2>&1; then
              echo "Supervisor is ready"
              break
            fi
            if ! docker exec "$CONTAINER" bash -lc "kill -0 \$(cat /tmp/supervisor_run.pid)" > /dev/null 2>&1; then
              echo "supervisor_run exited before Supervisor became ready"
              docker exec "$CONTAINER" bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
              exit 1
            fi
            sleep 10
          done
          if ! docker exec "$CONTAINER" bash -lc "ha --no-progress supervisor info" > /dev/null 2>&1; then
            echo "Supervisor did not become ready in time"
            docker exec "$CONTAINER" bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
            docker exec "$CONTAINER" bash -lc "docker ps -a" || true
            exit 1
          fi

      - name: Seed Recorder DB
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          docker exec "$CONTAINER" bash -lc "python /workspaces/${{ github.event.repository.name }}/recorder_db_fixture.py /mnt/supervisor/home-assistant_v2.db"
          docker exec "$CONTAINER" bash -lc "ls -l /mnt/supervisor/home-assistant_v2.db"

      - name: Install And Start Add-on
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev

          # The devcontainer runs Supervisor in a CI Docker-in-Docker setup,
          # which can be marked unhealthy even after Supervisor is usable.
          docker exec "$CONTAINER" bash -lc "ha --no-progress jobs options --ignore-conditions healthy"

          if docker exec "$CONTAINER" bash -lc "ha --no-progress apps install fpca_aft_addon"; then
            SLUG=fpca_aft_addon
          elif docker exec "$CONTAINER" bash -lc "ha --no-progress apps install local_fpca_aft_addon"; then
            SLUG=local_fpca_aft_addon
          else
            echo "Failed to install add-on (fpca_aft_addon or local_fpca_aft_addon)"
            exit 1
          fi

          docker exec "$CONTAINER" bash -lc "ha --no-progress apps start $SLUG"
          docker exec "$CONTAINER" bash -lc "ha --no-progress apps info $SLUG" | grep -q "state: started"

      - name: Verify Add-on Used Recorder DB
        run: |
          set -euo pipefail
          CONTAINER=ha-addon-dev
          ADDON_CONTAINER="$(
            docker exec "$CONTAINER" bash -lc \
              "docker ps --format '{{.Names}} {{.Image}}' | awk '/fpca_aft_addon|local_fpca_aft_addon/ { print \$1; exit }'"
          )"

          if [ -z "$ADDON_CONTAINER" ]; then
            echo "Could not find started add-on container"
            docker exec "$CONTAINER" bash -lc "docker ps -a" || true
            exit 1
          fi

          docker exec "$CONTAINER" bash -lc "docker logs '$ADDON_CONTAINER'" | grep -q "Using recorder DB fallback at /config/home-assistant_v2.db"
          docker exec "$CONTAINER" bash -lc "docker logs '$ADDON_CONTAINER'" | grep -q "Recorder rows returned: 168"

      - name: Dump Supervisor Logs (on failure)
        if: failure()
        run: |
          docker ps -a || true
          docker inspect ha-addon-dev || true
          docker logs ha-addon-dev || true
          docker exec ha-addon-dev bash -lc "tail -n 200 /tmp/supervisor_run.log" || true
          docker exec ha-addon-dev bash -lc "docker ps -a" || true
          docker exec ha-addon-dev bash -lc "ha --no-progress supervisor logs --lines 200" || true
