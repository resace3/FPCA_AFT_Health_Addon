name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask app and check health
        run: |
          set -euo pipefail
          python -m flask --app app run --host 127.0.0.1 --port 5056 &
          FLASK_PID=$!
          for i in {1..20}; do
            if curl -sSf http://127.0.0.1:5056/api/health > /dev/null; then
              echo "Flask health check passed"
              kill "$FLASK_PID"
              wait "$FLASK_PID" || true
              exit 0
            fi
            sleep 0.5
          done
          echo "Flask health check failed"
          kill "$FLASK_PID" || true
          wait "$FLASK_PID" || true
          exit 1

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile -t fpca-aft-addon:ci .
