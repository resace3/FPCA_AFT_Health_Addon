name: Activity Health Insights
version: "0.3.0"
slug: fpca_aft_addon
description: Step-pattern health estimates from Home Assistant activity data

startup: application
boot: auto
init: false

ingress: true
ingress_port: 5056

panel_icon: mdi:heart-pulse
panel_title: Activity Health
panel_admin: false

homeassistant_api: true
hassio_api: true

map:
  - config:rw

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.20
  amd64: ghcr.io/home-assistant/amd64-base:3.20
  armhf: ghcr.io/home-assistant/armhf-base:3.20
  armv7: ghcr.io/home-assistant/armv7-base:3.20
  i386: ghcr.io/home-assistant/i386-base:3.20

options: {}
schema: {}
